<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Gems Tracker (Local Live)</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #ff3d00; 
            --green: #00e676;
            --orange: #ff9100;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 30px auto;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 5px;
            font-size: 2.2rem;
        }

        h1 span {
            color: var(--accent);
        }

        .status-day {
            font-size: 1rem;
            color: var(--text-sub);
            margin-top: 10px;
        }

        .grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border-top: 4px solid var(--accent);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .title {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 0 0 5px 0;
            color: #fff;
            line-height: 1.3;
        }

        .genres-list {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .rating-badge {
            background-color: rgba(255, 145, 0, 0.15);
            color: var(--orange);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .rating-badge.good {
            background-color: rgba(0, 230, 118, 0.15);
            color: var(--green);
        }

        .description {
            font-size: 0.9rem;
            color: #d1d1d1;
            line-height: 1.5;
            margin: 15px 0;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 6px;
            border-left: 2px solid #444;
        }

        .info-item {
            font-size: 0.95rem;
            margin: 6px 0;
            color: var(--text-sub);
        }

        .info-item strong {
            color: #fff;
        }

        .status-badge {
            color: var(--green);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>New <span>Gems Tracker</span></h1>
        <p style="margin: 5px 0; color: #888;">0 - 4 months old • Offline Stable Engine • Action, Sci-Fi & Thriller</p>
        <div class="status-day" id="live-date">Loading dashboard...</div>
    </header>

    <div class="grid" id="content-grid">
        </div>

    <script>
        // Set dynamic date in English
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('live-date').innerText = `Today: ${new Date().toLocaleDateString('en-US', dateOptions)}`;

        // Embedded secure data pool to completely bypass network blockades
        const embeddedGems = [
            {
                title: "Dune: Part Two",
                rating: 8.6,
                genres: "Sci-Fi • Adventure • Action",
                overview: "Paul Atreides unites with Chani and the Fremen while seeking revenge against the conspirators who destroyed his family. Facing a choice between the love of his life and the fate of the universe, he endeavors to prevent a terrible future.",
                type: "Movie",
                released: "28-02-2024"
            },
            {
                title: "Civil War",
                rating: 7.2,
                genres: "Action • Thriller",
                overview: "In a near-future America balanced on a razor's edge, a team of military-embedded journalists races against time to reach Washington, D.C. before rebel factions descend upon the White House.",
                type: "Movie",
                released: "12-04-2024"
            },
            {
                title: "Fallout",
                rating: 8.5,
                genres: "Sci-Fi • Action • Drama",
                overview: "The story of haves and have-nots in a world in which there’s almost nothing left to have. 200 years after the apocalypse, a peaceful denizen of a cozy fallout shelter is forced to return to the surface.",
                type: "TV Show",
                released: "10-04-2024"
            },
            {
                title: "Godzilla x Kong: The New Empire",
                rating: 6.7,
                genres: "Action • Sci-Fi • Adventure",
                overview: "Two ancient titans, Godzilla and Kong, clash in an epic battle as humans unravel their intertwined origins and connection to the mysteries of Skull Island.",
                type: "Movie",
                released: "27-03-2024"
            },
            {
                title: "Dark Matter",
                rating: 7.8,
                genres: "Sci-Fi • Thriller • Mystery",
                overview: "Jason Dessen is abducted into an alternate version of his life. To get back to his true family, he must journey through a harrowing series of parallel realities to save them from the ultimate enemy: himself.",
                type: "TV Show",
                released: "08-05-2024"
            },
            {
                title: "The局 (The Ministry of Ungentlemanly Warfare)",
                rating: 7.1,
                genres: "Action • War • Comedy",
                overview: "The British military recruits a small group of highly-skilled soldiers to strike against German forces behind enemy lines during World War II, using entirely unconventional and ungentlemanly techniques.",
                type: "Movie",
                released: "19-04-2024"
            }
        ];

        function renderGems() {
            const grid = document.getElementById('content-grid');
            let htmlBuilder = '';

            embeddedGems.forEach(item => {
                const badgeClass = item.rating >= 6.5 ? 'good' : '';
                
                htmlBuilder += `
                    <div class="card">
                        <div>
                            <div class="rating-badge ${badgeClass}">★ ${item.rating.toFixed(1)} / 10</div>
                            <h2 class="title">${item.title}</h2>
                            <div class="genres-list">${item.genres}</div>
                            <div class="description">${item.overview}</div>
                            <div class="info-item"><strong>Type:</strong> ${item.type}</div>
                            <div class="info-item"><strong>Release:</strong> <span class="status-badge">Released: ${item.released}</span></div>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = htmlBuilder;
        }

        // Run instantly without waiting for slow servers or network ports
        renderGems();
    </script>
</body>
</html>
