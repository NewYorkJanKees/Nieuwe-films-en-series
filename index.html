<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Gems Tracker (5.0+ Live)</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #ff3d00; 
            --green: #00e676;
            --orange: #ff9100;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 30px auto;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 5px;
            font-size: 2.2rem;
        }

        h1 span {
            color: var(--accent);
        }

        .status-day {
            font-size: 1rem;
            color: var(--text-sub);
            margin-top: 10px;
        }

        .grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border-top: 4px solid var(--accent);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .title {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 0 0 5px 0;
            color: #fff;
            line-height: 1.3;
        }

        .genres-list {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .rating-badge {
            background-color: rgba(255, 145, 0, 0.15);
            color: var(--orange);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .rating-badge.good {
            background-color: rgba(0, 230, 118, 0.15);
            color: var(--green);
        }

        .description {
            font-size: 0.9rem;
            color: #d1d1d1;
            line-height: 1.5;
            margin: 15px 0;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 6px;
            border-left: 2px solid #444;
        }

        .info-item {
            font-size: 0.95rem;
            margin: 6px 0;
            color: var(--text-sub);
        }

        .info-item strong {
            color: #fff;
        }

        .status-badge {
            color: var(--green);
            font-weight: bold;
        }

        .loader {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-sub);
            padding: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>New <span>Gems Tracker</span></h1>
        <p style="margin: 5px 0; color: #888;">0 - 4 months old • Live Database • Minimum score: 5.0 • Action, Sci-Fi or Thriller</p>
        <div class="status-day" id="live-date">Checking data...</div>
    </header>

    <div class="grid" id="content-grid">
        <div class="loader" id="loader">Scanning live database for the latest releases...</div>
    </div>

    <script>
        // Set today's date
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('live-date').innerText = `Today: ${new Date().toLocaleDateString('en-US', dateOptions)}`;

        const API_KEY = '8407ff27cb9df770f6e91f153096055d'; 
        
        // Helper function to force a timeout if the network requests hang
        async function fetchWithTimeout(url, options = {}, timeout = 5000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (error) {
                clearTimeout(id);
                throw error;
            }
        }

        async function fetchLiveData() {
            const grid = document.getElementById('content-grid');
            
            const formatDate = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const today = new Date();
            const fourMonthsAgo = new Date();
            fourMonthsAgo.setMonth(fourMonthsAgo.getMonth() - 4);

            const dateTo = formatDate(today);
            const dateFrom = formatDate(fourMonthsAgo);

            const movieUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=en-US&region=US&sort_by=primary_release_date.desc&release_date.gte=${dateFrom}&release_date.lte=${dateTo}&vote_average.gte=5.0&with_genres=28|878|53&vote_count.gte=10`;
            const tvUrl = `https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&language=en-US&sort_by=first_air_date.desc&first_air_date.gte=${dateFrom}&first_air_date.lte=${dateTo}&vote_average.gte=5.0&with_genres=28|878|53&vote_count.gte=5`;

            const genreNames = { 28: "Action", 12: "Adventure", 878: "Sci-Fi", 53: "Thriller", 18: "Drama", 35: "Comedy", 80: "Crime", 9648: "Mystery" };

            try {
                // Fetch with a 5-second maximum loading window
                const [movieResponse, tvResponse] = await Promise.all([
                    fetchWithTimeout(movieUrl, {}, 5000),
                    fetchWithTimeout(tvUrl, {}, 5000)
                ]);
                
                if (!movieResponse.ok || !tvResponse.ok) {
                    throw new Error(`API Connection Failed (Status: ${movieResponse.status}/${tvResponse.status})`);
                }

                const movies = await movieResponse.json();
                const tvShows = await tvResponse.json();

                let combinedList = [];

                if (movies && movies.results) {
                    movies.results.forEach(movie => {
                        if (movie.release_date) {
                            combinedList.push({
                                title: movie.title,
                                genres: movie.genre_ids.map(id => genreNames[id] || "").filter(name => name !== "").join(" • "),
                                score: movie.vote_average ? movie.vote_average.toFixed(1) : "0.0",
                                type: "Movie",
                                rawDate: movie.release_date,
                                displayDate: movie.release_date.split('-').reverse().join('-'),
                                description: movie.overview || "No English description available."
                            });
                        }
                    });
                }

                if (tvShows && tvShows.results) {
                    tvShows.results.forEach(show => {
                        if (show.first_air_date) {
                            combinedList.push({
                                title: show.name,
                                genres: show.genre_ids.map(id => genreNames[id] || "").filter(name => name !== "").join(" • "),
                                score: show.vote_average ? show.vote_average.toFixed(1) : "0.0",
                                type: "TV Show",
                                rawDate: show.first_air_date,
                                displayDate: show.first_air_date.split('-').reverse().join('-'),
                                description: show.overview || "No English description available."
                            });
                        }
                    });
                }

                combinedList.sort((a, b) => new Date(b.rawDate) - new Date(a.rawDate));

                if (combinedList.length === 0) {
                    grid.innerHTML = '<div class="loader">No new titles found matching the criteria.</div>';
                    return;
                }

                let htmlBuilder = '';
                for (let item of combinedList) {
                    const badgeClass = parseFloat(item.score) >= 6.5 ? 'good' : '';
                    htmlBuilder += `
                        <div class="card">
                            <div>
                                <div class="rating-badge ${badgeClass}">★ ${item.score} / 10</div>
                                <h2 class="title">${item.title}</h2>
                                <div class="genres-list">${item.genres || 'Action / Sci-Fi / Thriller'}</div>
                                <div class="description">${item.description}</div>
                                <div class="info-item"><strong>Type:</strong> ${item.type}</div>
                                <div class="info-item"><strong>Release:</strong> <span class="status-badge">Released: ${item.displayDate}</span></div>
                            </div>
                        </div>
                    `;
                }

                grid.innerHTML = htmlBuilder;

            } catch (error) {
                console.error("Tracker Error:", error);
                
                let friendlyMessage = error.message;
                if (error.name === 'AbortError') {
                    friendlyMessage = "The request timed out. Connection to TMDB is being blocked or is too slow.";
                }

                grid.innerHTML = `
                    <div class="loader" style="color: #ff3d00;">
                        <strong>Database Connection Failed</strong><br>
                        <span style="font-size:0.9rem; color:#aaa;">${friendlyMessage}</span><br><br>
                        <div style="font-size:0.85rem; text-align:left; max-width:500px; margin:0 auto; background:#222; padding:15px; border-radius:6px; color:#ccc;">
                            <strong>How to fix this:</strong><br>
                            1. Turn off your <strong>Adblocker</strong> or <strong>Brave Shields</strong> for this page.<br>
                            2. Check if you are connected to a restrictive VPN or school/work network.<br>
                            3. Open the file in a different browser (like Chrome or Edge).
                        </div>
                    </div>`;
            }
        }

        fetchLiveData();
    </script>
</body>
</html>
