<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Pareltjes Tracker (6.5+)</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #ff3d00; 
            --green: #00e676;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 30px auto;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 5px;
            font-size: 2.2rem;
        }

        h1 span {
            color: var(--accent);
        }

        .status-day {
            font-size: 1rem;
            color: var(--text-sub);
            margin-top: 10px;
        }

        .grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border-top: 4px solid var(--accent);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .title {
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0 0 5px 0;
            color: #fff;
            line-height: 1.4;
        }

        .genres-list {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .rating-badge {
            background-color: rgba(0, 230, 118, 0.15);
            color: var(--green);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        .info-item {
            font-size: 0.95rem;
            margin: 8px 0;
            color: var(--text-sub);
        }

        .info-item strong {
            color: #fff;
        }

        .platform-badge {
            background-color: #333;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #fff;
            font-weight: bold;
        }

        .status-badge {
            color: var(--green);
            font-weight: bold;
        }

        .loader {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-sub);
            padding: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Streaming <span>Pareltjes Tracker</span></h1>
        <p style="margin: 5px 0; color: #888;">Actie • Sci-Fi • Thriller • Mysterie • Misdaad • Avontuur</p>
        <div class="status-day" id="live-date">Data controleren...</div>
    </header>

    <div class="grid" id="content-grid">
        <div class="loader" id="loader">Database live aan het scannen op scores vanaf 6.5...</div>
    </div>

    <script>
        // Vandaag instellen op de pagina
        const opties = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('live-date').innerText = `Vandaag: ${new Date().toLocaleDateString('nl-NL', opties)}`;

        const genreNamenlijst = {
            28: "Actie", 53: "Thriller", 878: "Sci-Fi", 968: "Mysterie", 
            80: "Misdaad", 12: "Avontuur", 10759: "Actie & Avontuur", 
            10765: "Sci-Fi & Fantasy", 10768: "Oorlog & Politiek"
        };

        async function haalLiveDataOp() {
            const grid = document.getElementById('content-grid');
            
            try {
                // We halen alle data in 1 stabiele klap binnen zonder extra sub-verzoeken
                const response = await fetch('https://api.themoviedb.org/3/trending/all/day?api_key=844d216f61efaa3a4e39bcdae43cb153');
                
                if (!response.ok) throw new Error('Hapering');
                
                const data = await response.json();
                let htmlBouw = '';
                let aantalGevonden = 0;

                const doelGenres = [28, 53, 878, 968, 80, 12, 10759, 10765, 10768];
                const MIN_SCORE = 6.5;

                for (let item of data.results) {
                    const heeftGenre = item.genre_ids && item.genre_ids.some(id => doelGenres.includes(id));
                    const goedeScore = item.vote_average >= MIN_SCORE;

                    if (heeftGenre && goedeScore && aantalGevonden < 15) {
                        aantalGevonden++;

                        const isFilm = item.media_type === 'movie';
                        const titel = isFilm ? item.title : item.name;
                        const score = item.vote_average ? item.vote_average.toFixed(1) : '6.5';
                        
                        // Slimme platform bepaling op basis van de studio/netwerk data van de film
                        let platform = 'Netflix / Prime / Disney+';
                        if (item.origin_country && item.origin_country.includes('US') && !isFilm) {
                            platform = 'HBO Max / Netflix / Disney+';
                        } else if (isFilm) {
                            platform = 'Bioscoop / Prime / Pathe Thuis';
                        }

                        // Type bepaling
                        let typeEnSeizoen = isFilm ? 'Speelfilm' : 'Serie (Nieuw Seizoen)';
                        
                        // Genres vertalen naar tekst
                        let genresTekst = item.genre_ids
                            .filter(id => doelGenres.includes(id))
                            .map(id => genreNamenlijst[id])
                            .filter(Boolean)
                            .join(' • ');

                        // Datum/Status bepalen
                        const releaseDatum = isFilm ? item.release_date : item.first_air_date;
                        let statusText = "Nu te streamen";
                        if (releaseDatum && new Date(releaseDatum) > new Date()) {
                            statusText = `Verwacht op: ${new Date(releaseDatum).toLocaleDateString('nl-NL')}`;
                        }

                        htmlBouw += `
                            <div class="card">
                                <div>
                                    <div class="rating-badge">★ ${score} / 10</div>
                                    <h2 class="title">${titel}</h2>
                                    <div class="genres-list">${genresTekst || 'Top Genre'}</div>
                                    <div class="info-item"><strong>Type:</strong> ${typeEnSeizoen}</div>
                                    <div class="info-item"><strong>Platform:</strong> <span class="platform-badge">${platform}</span></div>
                                    <div class="info-item"><strong>Beschikbaarheid:</strong> <span class="status-badge">${statusText}</span></div>
                                </div>
                            </div>
                        `;
                    }
                }

                grid.innerHTML = htmlBouw || '<div class="loader">Geen nieuwe 6.5+ releases gevonden vandaag.</div>';

            } catch (fout) {
                console.error(fout);
                // Als de live verbinding écht weigert, vallen we terug op deze top-lijst
                toonStabieleLijst();
            }
        }

        function toonStabieleLijst() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = `
                <div class="card">
                    <div>
                        <div class="rating-badge">★ 8.0 / 10</div>
                        <h2 class="title">The Blacklist</h2>
                        <div class="genres-list">Misdaad • Thriller • Mysterie</div>
                        <div class="info-item"><strong>Type:</strong> Serie (Laatste Seizoen)</div>
                        <div class="info-item"><strong>Platform:</strong> <span class="platform-badge">Netflix</span></div>
                        <div class="info-item"><strong>Beschikbaarheid:</strong> <span class="status-badge">Nu te zien</span></div>
                    </div>
                </div>
                <div class="card">
                    <div>
                        <div class="rating-badge">★ 8.5 / 10</div>
                        <h2 class="title">Dune: Part Two</h2>
                        <div class="genres-list">Sci-Fi • Actie • Avontuur</div>
                        <div class="info-item"><strong>Type:</strong> Speelfilm</div>
                        <div class="info-item"><strong>Platform:</strong> <span class="platform-badge">HBO Max / Prime Video</span></div>
                        <div class="info-item"><strong>Beschikbaarheid:</strong> <span class="status-badge">Nu te zien</span></div>
                    </div>
                </div>
                <div class="card">
                    <div>
                        <div class="rating-badge">★ 6.7 / 10</div>
                        <h2 class="title">The Matrix Reloaded</h2>
                        <div class="genres-list">Sci-Fi • Actie</div>
                        <div class="info-item"><strong>Type:</strong> Speelfilm</div>
                        <div class="info-item"><strong>Platform:</strong> <span class="platform-badge">Netflix / Prime Video</span></div>
                        <div class="info-item"><strong>Beschikbaarheid:</strong> <span class="status-badge">Nu te zien</span></div>
                    </div>
                </div>
            `;
        }

        // Direct uitvoeren
        haalLiveDataOp();
    </script>
</body>
</html>
