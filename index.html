<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Nieuwe Releases Tracker (6.5+)</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #ff3d00; 
            --green: #00e676;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 30px auto;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 5px;
            font-size: 2.2rem;
        }

        h1 span {
            color: var(--accent);
        }

        .status-day {
            font-size: 1rem;
            color: var(--text-sub);
            margin-top: 10px;
        }

        .grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border-top: 4px solid var(--accent);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .title {
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0 0 5px 0;
            color: #fff;
            line-height: 1.4;
        }

        .genres-list {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .rating-badge {
            background-color: rgba(0, 230, 118, 0.15);
            color: var(--green);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        .info-item {
            font-size: 0.95rem;
            margin: 8px 0;
            color: var(--text-sub);
        }

        .info-item strong {
            color: #fff;
        }

        .platform-badge {
            background-color: #333;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #fff;
            font-weight: bold;
        }

        .status-badge {
            color: var(--green);
            font-weight: bold;
        }

        .loader {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-sub);
            padding: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Grote <span>Releases Tracker</span></h1>
        <p style="margin: 5px 0; color: #888;">Nieuwste titels (0-4 maanden oud) • Score 6.5+</p>
        <div class="status-day" id="live-date">Data controleren...</div>
    </header>

    <div class="grid" id="content-grid">
        <div class="loader" id="loader">Live de allernieuwste releases van de afgelopen 4 maanden scannen...</div>
    </div>

    <script>
        // Vandaag instellen op de pagina
        const opties = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('live-date').innerText = `Vandaag: ${new Date().toLocaleDateString('nl-NL', opties)}`;

        const genreNamenlijst = {
            28: "Actie", 53: "Thriller", 878: "Sci-Fi", 968: "Mysterie", 
            80: "Misdaad", 12: "Avontuur", 10759: "Actie & Avontuur", 
            10765: "Sci-Fi & Fantasy", 10768: "Oorlog & Politiek"
        };

        async function haalLiveDataOp() {
            const grid = document.getElementById('content-grid');
            
            try {
                // We halen de meest recente populaire titels op die NU wereldwijd de lijsten vullen
                const response = await fetch('https://api.themoviedb.org/3/trending/all/week?api_key=844d216f61efaa3a4e39bcdae43cb153');
                
                if (!response.ok) throw new Error('Hapering');
                
                const data = await response.json();
                let htmlBouw = '';
                let aantalGevonden = 0;

                const doelGenres = [28, 53, 878, 968, 80, 12, 10759, 10765, 10768];
                const MIN_SCORE = 6.5;

                // Bereken de datumgrens (vandaag minus 4 maanden)
                const vandaag = new Date();
                const vierMaandenGeleden = new Date();
                vierMaandenGeleden.setMonth(vandaag.getMonth() - 4);

                for (let item of data.results) {
                    const heeftGenre = item.genre_ids && item.genre_ids.some(id => doelGenres.includes(id));
                    const goedeScore = item.vote_average >= MIN_SCORE;
                    
                    // Release datum bepalen en controleren
                    const isFilm = item.media_type === 'movie';
                    const releaseDatumStr = isFilm ? item.release_date : item.first_air_date;
                    const releaseDatum = releaseDatumStr ? new Date(releaseDatumStr) : null;

                    // FILTER: Moet tussen NU en 4 maanden geleden zijn uitgekomen (of binnenkort uitkomen)
                    const valtBinnenPeriode = releaseDatum && (releaseDatum >= vierMaandenGeleden);

                    if (heeftGenre && goedeScore && valtBinnenPeriode && aantalGevonden < 18) {
                        aantalGevonden++;

                        const titel = isFilm ? item.title : item.name;
                        const score = item.vote_average ? item.vote_average.toFixed(1) : '6.5';
                        
                        // Dynamische platform inschatting op basis van herkomst/type
                        let platform = 'Netflix / Prime Video / Disney+';
                        if (!isFilm && item.origin_country && item.origin_country.includes('US')) {
                            platform = 'HBO Max / Netflix / Disney+';
                        } else if (isFilm) {
                            platform = 'Bioscoop / Netflix / Prime';
                        }

                        let typeEnSeizoen = isFilm ? 'Speelfilm' : 'Serie (Nieuw Seizoen)';
                        
                        let genresTekst = item.genre_ids
                            .filter(id => doelGenres.includes(id))
                            .map(id => genreNamenlijst[id])
                            .filter(Boolean)
                            .join(' • ');

                        let statusText = `Uitgekomen op: ${releaseDatum.toLocaleDateString('nl-NL')}`;
                        if (releaseDatum > vandaag) {
                            statusText = `Verwacht op: ${releaseDatum.toLocaleDateString('nl-NL')}`;
                        }

                        htmlBouw += `
                            <div class="card">
                                <div>
                                    <div class="rating-badge">★ ${score} / 10</div>
                                    <h2 class="title">${titel}</h2>
                                    <div class="genres-list">${genresTekst || 'Top Genre'}</div>
                                    <div class="info-item"><strong>Type:</strong> ${typeEnSeizoen}</div>
                                    <div class="info-item"><strong>Platform:</strong> <span class="platform-badge">${platform}</span></div>
                                    <div class="info-item"><strong>Release:</strong> <span class="status-badge">${statusText}</span></div>
                                </div>
                            </div>
                        `;
                    }
                }

                if (aantalGevonden === 0) {
                    grid.innerHTML = '<div class="loader">Er zijn in de afgelopen 4 maanden geen gloednieuwe releases verschenen die aan de 6.5+ score voldoen binnen deze genres.</div>';
                } else {
                    grid.innerHTML = htmlBouw;
                }

            } catch (fout) {
                console.error(fout);
                grid.innerHTML = '<div class="loader" style="color:red;">Er ging iets mis bij het live scannen. Ververs de pagina om het opnieuw te proberen.</div>';
            }
        }

        // Direct starten
        haalLiveDataOp();
    </script>
</body>
</html>
