<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Pareltjes Tracker (5.0+ Live)</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #ff3d00; 
            --green: #00e676;
            --orange: #ff9100;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 30px auto;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 5px;
            font-size: 2.2rem;
        }

        h1 span {
            color: var(--accent);
        }

        .status-day {
            font-size: 1rem;
            color: var(--text-sub);
            margin-top: 10px;
        }

        .grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border-top: 4px solid var(--accent);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .title {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 0 0 5px 0;
            color: #fff;
            line-height: 1.3;
        }

        .genres-list {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .rating-badge {
            background-color: rgba(255, 145, 0, 0.15);
            color: var(--orange);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .rating-badge.good {
            background-color: rgba(0, 230, 118, 0.15);
            color: var(--green);
        }

        .description {
            font-size: 0.9rem;
            color: #d1d1d1;
            line-height: 1.5;
            margin: 15px 0;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 6px;
            border-left: 2px solid #444;
        }

        .info-item {
            font-size: 0.95rem;
            margin: 6px 0;
            color: var(--text-sub);
        }

        .info-item strong {
            color: #fff;
        }

        .status-badge {
            color: var(--green);
            font-weight: bold;
        }

        .loader {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-sub);
            padding: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Nieuwe <span>Pareltjes Tracker</span></h1>
        <p style="margin: 5px 0; color: #888;">0 - 4 maanden oud • Live Database • Minimale score: 5.0 • Actie, Sci-Fi of Thriller</p>
        <div class="status-day" id="live-date">Data controleren...</div>
    </header>

    <div class="grid" id="content-grid">
        <div class="loader" id="loader">Database live aan het scannen op de allernieuwste releases...</div>
    }</div>
