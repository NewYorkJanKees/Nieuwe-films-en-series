<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Streaming Pareltjes Tracker (6.5+ met Platform)</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #ff3d00; 
            --green: #00e676;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 30px auto;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 5px;
            font-size: 2.2rem;
        }

        h1 span {
            color: var(--accent);
        }

        .status-day {
            font-size: 1rem;
            color: var(--text-sub);
            margin-top: 10px;
        }

        .grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border-top: 4px solid var(--accent);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .title {
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0 0 5px 0;
            color: #fff;
            line-height: 1.4;
        }

        .genres-list {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .rating-badge {
            background-color: rgba(0, 230, 118, 0.15);
            color: var(--green);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        .info-item {
            font-size: 0.95rem;
            margin: 8px 0;
            color: var(--text-sub);
        }

        .info-item strong {
            color: #fff;
        }

        .platform-badge {
            background-color: #e50914; /* Rood voor opvallen */
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #fff;
            font-weight: bold;
        }

        .status-badge {
            color: var(--green);
            font-weight: bold;
        }

        .loader {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-sub);
            padding: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Streaming <span>Live Detail Tracker</span></h1>
        <p style="margin: 5px 0; color: #888;">Actie • Sci-Fi • Thriller • Mysterie • Misdaad • Avontuur</p>
        <div class="status-day" id="live-date">Data live ophalen en platformen controleren...</div>
    </header>

    <div class="grid" id="content-grid">
        <div class="loader" id="loader">Alle streamingdiensten in Nederland worden nu live doorzocht (6.5+)...</div>
    </div>

    <script>
        const API_KEY = '844d216f61efaa3a4e39bcdae43cb153'; // Openbare universele sleutel
        const REGIO = 'NL'; // Filter specifiek op Nederlandse streamingrechten

        // Vandaag instellen op de pagina
        const opties = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('live-date').innerText = `Vandaag: ${new Date().toLocaleDateString('nl-NL', opties)}`;

        const genreNamenlijst = {
            28: "Actie", 53: "Thriller", 878: "Sci-Fi", 968: "Mysterie", 
            80: "Misdaad", 12: "Avontuur", 10759: "Actie & Avontuur", 
            10765: "Sci-Fi & Fantasy", 10768: "Oorlog & Politiek"
        };

        // Functie om live te checken OP WELK platform hij nu staat in NL
        async function haalPlatformOp(id, type) {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}/watch/providers?api_key=${API_KEY}`);
                const data = await res.json();
                const nlData = data.results?.[REGIO];
                
                let diensten = [];
                if (nlData?.flatrate) {
                    diensten = nlData.flatrate.map(p => p.provider_name);
                }
                if (nlData?.free) {
                    diensten = [...diensten, ...nlData.free.map(p => p.provider_name)];
                }
                
                return diensten.length > 0 ? diensten.join(', ') : 'Bioscoop / Onbekende Stream';
            } catch {
                return 'Streaming (Check Netflix/Prime)';
            }
        }

        // Functie om details zoals het specifieke seizoensnummer op te halen voor series
        async function haalSerieDetailsOp(id) {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=nl-NL`);
                const data = await res.json();
                return data.number_of_seasons ? `Serie (Seizoen ${data.number_of_seasons})` : 'Serie (Nieuw Seizoen)';
            } catch {
                return 'Serie';
            }
        }

        async function haalLiveDataOp() {
            const grid = document.getElementById('content-grid');
            
            try {
                const response = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`);
                if (!response.ok) throw new Error('Netwerk reageert niet');
                
                const data = await response.json();
                let htmlBouw = '';
                let aantalGevonden = 0;

                const doelGenres = [28, 53, 878, 968, 80, 12, 10759, 10765, 10768];
                const MIN_SCORE = 6.5;

                for (let item of data.results) {
                    const heeftGenre = item.genre_ids && item.genre_ids.some(id => doelGenres.includes(id));
                    const goedeScore = item.vote_average >= MIN_SCORE;

                    if (heeftGenre && goedeScore && aantalGevonden < 15) {
                        aantalGevonden++;

                        const isFilm = item.media_type === 'movie';
                        const type = isFilm ? 'movie' : 'tv';
                        const titel = isFilm ? item.title : item.name;
                        const score = item.vote_average ? item.vote_average.toFixed(1) : '6.5';
                        
                        // 1. Haal de exacte streamingdiensten op voor Nederland
                        const platformen = await haalPlatformOp(item.id, type);

                        // 2. Haal type/seizoensinformatie op
                        let typeEnSeizoen = 'Speelfilm';
                        if (!isFilm) {
                            typeEnSeizoen = await haalSerieDetailsOp(item.id);
                        }
                        
                        // Genres vertalen naar tekst
                        let genresTekst = item.genre_ids
                            .filter(id => doelGenres.includes(id))
                            .map(id => genreNamenlijst[id])
                            .filter(Boolean)
                            .join(' • ');

                        // Datum/Status bepalen
                        const releaseDatum = isFilm ? item.release_date : item.first_air_date;
                        let statusText = "Nu online te kijken";
                        if (releaseDatum && new Date(releaseDatum) > new Date()) {
                            statusText = `Verwacht op: ${new Date(releaseDatum).toLocaleDateString('nl-NL')}`;
                        }

                        htmlBouw += `
                            <div class="card">
                                <div>
                                    <div class="rating-badge">★ ${score} / 10</div>
                                    <h2 class="title">${titel}</h2>
                                    <div class="genres-list">${genresTekst || 'Top Genre'}</div>
                                    <div class="info-item"><strong>Type / Seizoen:</strong> ${typeEnSeizoen}</div>
                                    <div class="info-item"><strong>Platform:</strong> <span class="platform-badge">${platformen}</span></div>
                                    <div class="info-item"><strong>Wanneer te zien:</strong> <span class="status-badge">${statusText}</span></div>
                                </div>
                            </div>
                        `;
                    }
                }

                grid.innerHTML = htmlBouw || '<div class="loader">Geen nieuwe 6.5+ releases gevonden vandaag.</div>';

            } catch (fout) {
                console.error(fout);
                grid.innerHTML = '<div class="loader" style="color:red;">Fout bij het ophalen van de live platformen. Ververs de pagina.</div>';
            }
        }

        // Start het script direct
        haalLiveDataOp();
    </script>
</body>
</html>
